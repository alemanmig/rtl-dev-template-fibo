// Compile coverage only for the DUT hierarchy
+tree tb.dut 0

// sva/fcover are bound inside tb.dut (bind dut sva ... / bind dut fcover ...),
// so the +tree above pulls their code into the same line/cond/tgl numbers as
// the DUT itself. Exclude structural coverage for these checker/coverage
// modules so the RTL code-coverage % isn't diluted by verification-only code.
// "assert" is intentionally NOT excluded here: sva.sv's cover property
// statements still need it, and fcover.sv's covergroup (functional coverage)
// is unaffected by this exclusion since it's a separate metric.
begin line+cond+tgl -module sva end
begin line+cond+tgl -module fcover end
